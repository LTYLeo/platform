<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAI Developer Platform – Build with Intelligence</title>
  <link rel="icon" href="icon.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/framer-motion@10.16.3/dist/framer-motion.umd.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .sidebar {
      transition: all 0.3s ease;
    }
    .chat-bubble-user {
      background-color: #3b82f6;
      color: white;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      margin: 8px 0;
      max-width: 80%;
      align-self: flex-end;
    }
    .chat-bubble-ai {
      background-color: #f1f5f9;
      color: #334155;
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      margin: 8px 0;
      max-width: 80%;
      align-self: flex-start;
    }
    .code-block {
      background-color: #1e293b;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  
  <!-- Dashboard内容 -->
  <div class="max-w-6xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <!-- API使用情况卡片 -->
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">API Usage</h3>
        <p class="text-2xl font-bold text-blue-600">1,245 <span class="text-sm text-gray-500">requests</span></p>
        <p class="text-sm text-gray-500 mt-2">This month</p>
      </div>
      
      <!-- 剩余配额卡片 -->
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">Remaining Quota</h3>
        <p class="text-2xl font-bold text-green-600">75%</p>
        <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
          <div class="bg-green-600 h-2 rounded-full" style="width: 75%"></div>
        </div>
      </div>
      
      <!-- API密钥状态卡片 -->
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">API Keys</h3>
        <p class="text-2xl font-bold text-purple-600">3 <span class="text-sm text-gray-500">active</span></p>
        <p class="text-sm text-gray-500 mt-2">1 inactive</p>
      </div>
      
      <!-- 账单卡片 -->
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">Billing</h3>
        <p class="text-2xl font-bold text-orange-600">$42.50</p>
        <p class="text-sm text-gray-500 mt-2">Current balance</p>
      </div>
    </div>
    
    <!-- API密钥管理部分 -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-semibold text-gray-800">API Keys</h2>
        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Create New Key</button>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b">
              <th class="py-3 text-left">Name</th>
              <th class="py-3 text-left">Key</th>
              <th class="py-3 text-left">Created</th>
              <th class="py-3 text-left">Last Used</th>
              <th class="py-3 text-left">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b">
              <td class="py-3">Production Key</td>
              <td class="py-3 font-mono text-sm">sk-••••••••••••••••••••</td>
              <td class="py-3">Mar 15, 2025</td>
              <td class="py-3">Today</td>
              <td class="py-3">
                <button class="text-blue-600 hover:text-blue-800 mr-3">Copy</button>
                <button class="text-red-600 hover:text-red-800">Revoke</button>
              </td>
            </tr>
            <!-- 更多API密钥行 -->
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- 使用统计图表部分 -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Usage Statistics</h2>
      <!-- 这里可以添加图表 -->
      <div class="h-64 bg-gray-100 rounded-lg flex items-center justify-center">
        <p class="text-gray-500">Usage chart would be displayed here</p>
      </div>
    </div>
  </div>
  
  <!-- 页脚 -->
</body>
</html>
